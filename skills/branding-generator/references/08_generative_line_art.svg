<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#A7C6D9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#A7C6D9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="900" fill="#F6F0E6"/>

  <!-- soft cyan orbs -->
  <circle cx="540" cy="420" r="220" fill="url(#orb)"/>
  <circle cx="920" cy="520" r="180" fill="url(#orb)"/>

  <!-- radiating line burst -->
  <g stroke="#111" stroke-width="2" opacity="0.8">
    <circle cx="720" cy="470" r="6" fill="#111"/>
    <line x1="720" y1="470" x2="1040" y2="320"/>
    <line x1="720" y1="470" x2="980" y2="620"/>
    <line x1="720" y1="470" x2="860" y2="250"/>
    <line x1="720" y1="470" x2="760" y2="210"/>
    <line x1="720" y1="470" x2="540" y2="260"/>
    <line x1="720" y1="470" x2="420" y2="340"/>
    <line x1="720" y1="470" x2="380" y2="520"/>
    <line x1="720" y1="470" x2="460" y2="680"/>
    <line x1="720" y1="470" x2="740" y2="760"/>
  </g>

  <!-- instrument ticks -->
  <g stroke="#111" stroke-width="2" opacity="0.55">
    <line x1="220" y1="160" x2="220" y2="220"/>
    <line x1="1180" y1="160" x2="1180" y2="220"/>
    <line x1="220" y1="740" x2="220" y2="800"/>
    <line x1="1180" y1="740" x2="1180" y2="800"/>
  </g>

  <!-- single accent -->
  <circle cx="1040" cy="320" r="7" fill="#D97843"/>

  <text x="160" y="840" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#303030">GENERATIVE LINE ART</text>
  <text x="160" y="864" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6A6A6A">radiating burst Ę soft cyan orbs Ę instrument ticks Ę rust node</text>
</svg>

